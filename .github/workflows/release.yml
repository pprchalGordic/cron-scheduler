name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - run: go build -o cron-scheduler.exe .

      - uses: softprops/action-gh-release@v2
        with:
          files: cron-scheduler.exe
